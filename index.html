<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حوكشه STORE</title>

<!-- خط عربي احترافي + خط إنجليزي مودرن -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/*========================
🎯 ROOT & BASE SETUP
========================*/
:root {
  --black: #000000;
  --white: #ffffff;
  --glass: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glow: rgba(255, 255, 255, 0.2);
  --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  --blur: blur(20px);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Cairo', 'Manrope', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

button, input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
}

img {
  max-width: 100%;
  display: block;
}

/*========================
🔧 CUSTOMIZATION PLACEHOLDERS - عدل الروابط هنا
========================*/
/* 1. رابط فيديو الخلفية: استبدل الرابط ده بالفيديو بتاعك */
:root { --bg-video-url: url('https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4'); }

/* 2. رابط صورة اللوجو: استبدل الرابط ده بلوجو موقعك */
:root { --logo-url: url('https://via.placeholder.com/200x200/000/fff?text=LOGO'); }

/* 3. رقم واتساب: غير الرقم ده لرقمك - بدون + */
:root { --whatsapp-number: '201234567890'; }

/* 4. صور المنتجات: تقدر تعدلها من array المنتجات تحت في JS */

/*========================
🎬 BACKGROUND VIDEO & OVERLAY
========================*/
.bg-video-wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}

.bg-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.4); /* عدل اضاءة الخلفية من هنا: 0.1 اغمق, 1 افتح */
}

.bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.7) 100%);
  z-index: -1;
  pointer-events: none;
}

/* Subtle noise overlay */
.bg-overlay::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

/*========================
🧠 INTRO SCREEN
========================*/
.intro {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  transition: opacity 0.8s ease, visibility 0.8s;
}

.intro.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.logo-3d {
  width: 140px;
  height: 140px;
  background: var(--logo-url) center/contain no-repeat;
  filter: drop-shadow(0 0 30px var(--glow));
  animation: rotate360 8s linear infinite, float 3s ease-in-out infinite;
  transform-style: preserve-3d;
  will-change: transform;
}

@keyframes rotate360 {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotateY(0deg); }
  50% { transform: translateY(-12px) rotateY(180deg); }
}

.intro-text {
  text-align: center;
  opacity: 0;
  animation: fadeInUp 1s 0.5s forwards;
}

.intro-text h1 {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.intro-text p {
  font-size: 1.1rem;
  font-weight: 300;
  opacity: 0.8;
  margin-bottom: 32px;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.btn {
  background: var(--white);
  color: var(--black);
  padding: 14px 32px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px var(--glow);
}

.btn:active {
  transform: scale(0.98);
}

/*========================
🧩 HEADER
========================*/
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 24px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
}

.header.scrolled {
  padding: 12px 5%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
}

.header-logo {
  width: 60px;
  height: 60px;
  background: var(--logo-url) center/contain no-repeat;
  transition: var(--transition);
  cursor: pointer;
}

.header.scrolled .header-logo {
  width: 40px;
  height: 40px;
}

.cart-btn {
  position: relative;
  width: 48px;
  height: 48px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  display: grid;
  place-items: center;
}

.cart-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px var(--glow);
  transform: scale(1.05);
}

.cart-count {
  position: absolute;
  top: -4px;
  left: -4px;
  background: var(--white);
  color: var(--black);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 0.7rem;
  font-weight: 700;
  display: grid;
  place-items: center;
  transform: scale(0);
  transition: var(--transition);
}

.cart-count.active {
  transform: scale(1);
}

/*========================
📚 MAIN CONTENT
========================*/
.main {
  padding: 140px 5% 80px;
  min-height: 100vh;
  opacity: 0;
  transition: opacity 1s ease;
}

.main.visible {
  opacity: 1;
}

.section-title {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 48px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.8s forwards;
}

/*========================
📚 PRODUCTS GRID
========================*/
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.product-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 24px;
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  opacity: 0;
  transform: translateY(30px);
  animation: cardIn 0.6s forwards;
  will-change: transform;
}

.product-card:nth-child(1) { animation-delay: 0.1s; }
.product-card:nth-child(2) { animation-delay: 0.2s; }
.product-card:nth-child(3) { animation-delay: 0.3s; }
.product-card:nth-child(4) { animation-delay: 0.4s; }
.product-card:nth-child(5) { animation-delay: 0.5s; }
.product-card:nth-child(6) { animation-delay: 0.6s; }

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

.product-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 60px rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.2);
}

.product-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 20px;
  transition: var(--transition);
}

.product-card:hover .product-img {
  transform: scale(1.03);
  box-shadow: 0 0 40px var(--glow);
}

.product-name {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.product-price {
  font-size: 1rem;
  font-weight: 500;
  opacity: 0.8;
}

/*========================
📖 PRODUCT DETAILS MODAL
========================*/
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: var(--blur);
  display: grid;
  place-items: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition);
}

.modal.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  width: 100%;
  max-width: 900px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 32px;
  padding: 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  transform: scale(0.9);
  transition: var(--transition);
  position: relative;
}

.modal.active .modal-content {
  transform: scale(1);
}

.modal-close {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 40px;
  height: 40px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: var(--transition);
}

.modal-close:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: rotate(90deg);
}

.product-img-glow {
  width: 100%;
  border-radius: 20px;
  filter: drop-shadow(0 0 40px var(--glow));
  animation: floatSlow 4s ease-in-out infinite;
}

@keyframes floatSlow {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
}

.product-info h2 {
  font-size: 2rem;
  margin-bottom: 12px;
}

.product-info .price {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 24px;
}

.product-info .desc {
  opacity: 0.8;
  margin-bottom: 32px;
  line-height: 1.8;
}

.qty-selector {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.qty-btn {
  width: 40px;
  height: 40px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--white);
  cursor: pointer;
  transition: var(--transition);
}

.qty-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}

.qty-value {
  font-size: 1.2rem;
  font-weight: 600;
  min-width: 30px;
  text-align: center;
}

/*========================
🛒 CART PANEL
========================*/
.cart-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  max-width: 420px;
  height: 100vh;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: var(--blur);
  border-left: 1px solid var(--glass-border);
  z-index: 300;
  padding: 32px;
  transform: translateX(-100%);
  transition: var(--transition);
  overflow-y: auto;
}

.cart-panel.active {
  transform: translateX(0);
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}

.cart-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 32px;
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
}

.cart-item img {
  width: 60px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.cart-total {
  border-top: 1px solid var(--glass-border);
  padding-top: 24px;
  margin-bottom: 24px;
}

.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 1.2rem;
  font-weight: 700;
}

/*========================
💳 CHECKOUT FORM
========================*/
.checkout-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--white);
  transition: var(--transition);
}

.input-group input:focus {
  border-color: rgba(255, 255, 255, 0.3);
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
}

.input-group input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.payment-note {
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  font-size: 0.9rem;
  opacity: 0.8;
}

/*========================
✨ MICRO INTERACTIONS
========================*/
.fade-in {
  opacity: 0;
  animation: fadeIn 0.6s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/*========================
📱 RESPONSIVE
========================*/
@media (max-width: 768px) {
  .modal-content {
    grid-template-columns: 1fr;
    padding: 24px;
    gap: 24px;
  }
  
  .intro-text h1 {
    font-size: 2rem;
  }
  
  .products-grid {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
  }
  
  .cart-panel {
    max-width: 100%;
  }
  
  .header {
    padding: 20px 5%;
  }
}

/* Loading Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--glass) 25%, rgba(255,255,255,0.1) 50%, var(--glass) 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<!-- Background Video -->
<div class="bg-video-wrap">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4" type="video/mp4">
  </video>
</div>
<div class="bg-overlay"></div>

<!-- Intro Screen -->
<div class="intro" id="intro">
  <div class="logo-3d" id="logo3d"></div>
  <div class="intro-text">
    <h1>حوكشه STORE</h1>
    <p>تجربة جديدة لشراء الكتب الخارجية</p>
    <p style="font-size: 0.9rem; opacity: 0.6;">كتب الثانوية العامة بأعلى جودة وأفضل سعر</p>

<!-- Product Modal -->
<div class="modal" id="productModal">
  <div class="modal-content">

    <div class="product-info">
      <h2 id="modalName"></h2>
      <div class="price" id="modalPrice"></div>
      <p class="desc" id="modalDesc"></p>
      <div class="qty-selector">
        <button class="qty-btn" id="qtyMinus">-</button>
        <span class="qty-value" id="qtyValue">1</span>

<!-- Cart Panel -->

    </div>

      <input type="text" id="customerAddress" placeholder="العنوان بالتفصيل" required>

      <strong>طريقة الدفع:</strong> فودافون كاش<br>

  </form>
</div>

<script>
//========================
// 🧑‍💻 CONFIG - عدل البيانات هنا
//========================

// 4. صور المنتجات: عدل الصور والاسعار والاسماء براحتك
const PRODUCTS = [
  {

//========================

const intro = document.getElementById('intro');
const main = document.getElementById('main');

const productModal = document.getElementById('productModal');

//========================

//========================
document.addEventListener('DOMContentLoaded', () => {
  renderProducts();
  setupEventListeners();
  setupScrollHeader();
  setupHistoryAPI();
  
  // Parallax effect on 3D logo
  const logo3d = document.getElementById('logo3d');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;
    logo3d.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
  });
});

//========================
// RENDER PRODUCTS
//========================
function renderProducts() {
  productsGrid.innerHTML = PRODUCTS.map(product => `
    <div class="product-card" data-id="${product.id}">
      <img class="product-img" src="${product.img}" alt="${product.name}" loading="lazy">
      <div class="product-name">${product.name}</div>
      <div class="product-price">${product.price} EGP</div>
    </div>
  `).join('');
  
  // Add click listeners with parallax
  document.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', () => openProductModal(parseInt(card.dataset.id)));
    
    // Parallax on hover
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      card.style.transform = `translateY(-8px) scale(1.02) rotateX(${y * -5}deg) rotateY(${x * 5}deg)`;
    });
    
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
}

//========================
// EVENT LISTENERS
//========================
function setupEventListeners() {
  document.getElementById('enterBtn').addEventListener('click', enterStore);
  document.getElementById('cartBtn').addEventListener('click', toggleCart);
  document.getElementById('cartClose').addEventListener('click', toggleCart);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('headerLogo').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  
  document.getElementById('qtyPlus').addEventListener('click', () => updateQty(1));
  document.getElementById('qtyMinus').addEventListener('click', () => updateQty(-1));
  document.getElementById('addToCartBtn').addEventListener('click', addToCart);
  document.getElementById('checkoutForm').addEventListener('submit', handleCheckout);
  
  // Close modals on background click
  productModal.addEventListener('click', (e) => {
    if (e.target === productModal) closeModal();
  });
}

//========================
// INTRO & NAVIGATION
//========================
function enterStore() {
  intro.classList.add('hidden');
  main.classList.add('visible');
  history.pushState({ page: 'home' }, '', '#home');
}

function setupScrollHeader() {
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset;
    if (currentScroll > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
    lastScroll = currentScroll;
  });
}

//========================
// PRODUCT MODAL
//========================
function openProductModal(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  currentQty = 1;
  
  document.getElementById('modalImg').src = currentProduct.img;
  document.getElementById('modalName').textContent = currentProduct.name;
  document.getElementById('modalPrice').textContent = `${currentProduct.price} EGP`;
  document.getElementById('modalDesc').textContent = currentProduct.desc;
  document.getElementById('qtyValue').textContent = currentQty;
  
  productModal.classList.add('active');
  history.pushState({ page: 'product', id }, '', `#product-${id}`);
}

function closeModal() {
  productModal.classList.remove('active');
  if (history.state?.page === 'product') {
    history.back();
  }
}

function updateQty(change) {
  currentQty = Math.max(1, currentQty + change);
  document.getElementById('qtyValue').textContent = currentQty;
}

//========================
// CART SYSTEM
//========================
function addToCart() {
  const existing = cart.find(item => item.id === currentProduct.id);
  
  if (existing) {
    existing.qty += currentQty;
  } else {
    cart.push({ ...currentProduct, qty: currentQty });
  }
  
  updateCartUI();
  closeModal();
  
  // Visual feedback
  cartCount.style.transform = 'scale(1.3)';
  setTimeout(() => cartCount.style.transform = 'scale(1)', 200);
}

function toggleCart() {
  cartPanel.classList.toggle('active');
}

function updateCartUI() {
  const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
  const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  
  cartCount.textContent = totalItems;
  cartCount.classList.toggle('active', totalItems > 0);
  document.getElementById('cartTotal').textContent = `${totalPrice} EGP`;
  
  document.getElementById('cartItems').innerHTML = cart.length ? cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}">
      <div style="flex: 1;">
        <div style="font-weight: 600; margin-bottom: 4px;">${item.name}</div>
        <div style="opacity: 0.7; font-size: 0.9rem;">${item.qty} × ${item.price} EGP</div>
      </div>
      <button onclick="removeFromCart(${item.id})" style="background: none; color: #fff; cursor: pointer; opacity: 0.5;">×</button>
    </div>
  `).join('') : '<div style="text-align: center; opacity: 0.5; padding: 40px 0;">السلة فارغة</div>';
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  updateCartUI();
}

//========================
// CHECKOUT
//========================
function handleCheckout(e) {
  e.preventDefault();
  
  if (!cart.length) {
    alert('السلة فارغة');
    return;
  }
  
  const name = document.getElementById('customerName').value;
  const phone = document.getElementById('customerPhone').value;
  const address = document.getElementById('customerAddress').value;
  const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  
  let message = `*طلب جديد من حوكشه STORE*%0A%0A`;
  message += `*بيانات العميل:*%0A`;
  message += `الاسم: ${name}%0A`;
  message += `الموبايل: ${phone}%0A`;
  message += `العنوان: ${address}%0A%0A`;
  message += `*تفاصيل الطلب:*%0A`;
  
  cart.forEach(item => {
    message += `- ${item.name} × ${item.qty} = ${item.price * item.qty} EGP%0A`;
  });
  
  message += `%0A*الإجمالي: ${total} EGP*%0A%0A`;
  message += `طريقة الدفع: فودافون كاش`;
  
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
  
  // Reset
  cart = [];
  updateCartUI();
  toggleCart();
  e.target.reset();
}

//========================
// HISTORY API - Back Button
//========================
function setupHistoryAPI() {
  window.addEventListener('popstate', (e) => {
    if (!e.state || e.state.page === 'home') {
      productModal.classList.remove('active');
      cartPanel.classList.remove('active');
    } else if (e.state.page === 'product') {
      openProductModal(e.state.id);
    }
  });
}

// Parallax effect on cards idle animation
setInterval(() => {
  document.querySelectorAll('.product-card').forEach((card, i) => {
    const delay = i * 100;
    setTimeout(() => {
      card.style.animation = 'none';
      setTimeout(() => {
        card.style.animation = '';
      }, 50);
    }, delay);
  });
}, 5000);
</script>
