<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حوكشه STORE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/*========================
🎯 ROOT - كل التعديلات من هنا
========================*/
:root {
  --black: #000000;
  --white: #ffffff;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glow: rgba(255, 255, 255, 0.3);
  --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  --blur: blur(25px);

  /*========================
  🔧 الأماكن اللي تعدل فيها - محددة بالعربي
  ========================*/
  /* 1. حط رابط فيديو الخلفية هنا ↓↓ */
  --bg-video: url('Pin by Yare Mendez on insp _ Trippy visuals_ Dark nature aesthetic_ Film texture(MP4).mp4');

  /* 2. حط رابط صورة اللوجو بتاعك هنا ↓↓↓ */
  --logo-img: url('Picsart_26-04-17_15-18-45-258.png');

  /* 3. حط رقم الواتساب بتاعك هنا - من غير + ↓↓↓ */
  --whatsapp: '201023708424';
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

button, input {
  font-family: inherit;
  outline: none;
  border: none;
  color: inherit;
}

/*========================
🎬 فيديو الخلفية - انت هتغيره
========================*/
.bg-video-wrap {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.bg-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* عدل الاضاءة من هنا: 0.2 غامق, 0.6 فاتح */
  filter: brightness(0.8) contrast(1.2);
}

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: rgba(0,0,0,0.5);
  pointer-events: none;
}

/*========================
📱 الصفحات - SPA
========================*/
.page {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.6s ease, transform 0.6s ease;
  transform: translateX(50px);
}

.page.active {
  opacity: 1;
  visibility: visible;
  transform: translateX(0);
  position: relative;
}

/*========================
🏠 الصفحة الرئيسية - زي الصورة الأولى
========================*/
#homePage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
}

.logo-3d {
  width: 180px;
  height: 180px;
  background: var(--logo-img) center/contain no-repeat;
  filter: drop-shadow(0 0 60px var(--glow));
  animation: rotate360 10s linear infinite, floatLogo 4s ease-in-out infinite;
  margin-bottom: 80px;
  transform-style: preserve-3d;
}

@keyframes rotate360 {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

@keyframes floatLogo {
  0%, 100% { transform: translateY(0px) rotateY(0deg); }
  50% { transform: translateY(-25px) rotateY(180deg); }
}

.menu-btns {
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin-bottom: 80px;
}

.glow-btn {
  font-family: 'Orbitron', 'Cairo', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  padding: 18px 60px;
  background: transparent;
  color: var(--white);
  border: none;
  cursor: pointer;
  transition: var(--transition);
  text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
  letter-spacing: 3px;
  position: relative;
  animation: pulseGlow 2s ease-in-out infinite;
}

.glow-btn:nth-child(2) { animation-delay: 0.3s; }
.glow-btn:nth-child(3) { animation-delay: 0.6s; }

@keyframes pulseGlow {
  0%, 100% { text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); transform: scale(1); }
  50% { text-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow), 0 0 80px var(--glow); transform: scale(1.05); }
}

.glow-btn:hover {
  transform: scale(1.15);
  text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow), 0 0 120px var(--glow);
}

.social-icons {
  display: flex;
  gap: 24px;
}

.social-icons a {
  width: 40px;
  height: 40px;
  display: grid;
  place-items: center;
  opacity: 0.6;
  transition: var(--transition);
}

.social-icons a:hover {
  opacity: 1;
  transform: scale(1.2) translateY(-5px);
  filter: drop-shadow(0 0 20px var(--glow));
}

/*========================
🛍️ صفحة الكتالوج - زي الصورة التانية
========================*/
#catalogPage {
  padding-bottom: 60px;
}

.catalog-header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 16px 5%;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.catalog-nav {
  display: flex;
  gap: 24px;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 1px;
}

.catalog-nav a {
  opacity: 0.6;
  cursor: pointer;
  transition: var(--transition);
}

.catalog-nav a.active,.catalog-nav a:hover {
  opacity: 1;
  text-shadow: 0 0 20px var(--glow);
}

.header-logo {
  width: 40px;
  height: 40px;
  background: var(--logo-img) center/contain no-repeat;
  filter: drop-shadow(0 0 20px var(--glow));
}

.header-icons {
  display: flex;
  gap: 16px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  background: transparent;
  cursor: pointer;
  opacity: 0.7;
  transition: var(--transition);
  position: relative;
}

.icon-btn:hover {
  opacity: 1;
  transform: scale(1.1);
}

.cart-count {
  position: absolute;
  top: -4px;
  left: -4px;
  background: var(--white);
  color: var(--black);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 0.65rem;
  font-weight: 900;
  display: grid;
  place-items: center;
  transform: scale(0);
  transition: var(--transition);
}

.cart-count.active { transform: scale(1); }

.products-list {
  padding: 40px 5%;
  display: flex;
  flex-direction: column;
  gap: 50px;
  max-width: 500px;
  margin: 0 auto;
}

.product-item {
  position: relative;
  cursor: pointer;
  transition: var(--transition);
  touch-action: pan-y;
}

.product-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(255,255,255,0.1);
  animation: floatProduct 3s ease-in-out infinite;
}

.product-item:nth-child(even).product-img-wrap { animation-delay: 1.5s; }

@keyframes floatProduct {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
}

.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: var(--transition);
  user-select: none;
  -webkit-user-drag: none;
}

.product-item.swiping.product-img {
  transition: none;
}

.sold-out-badge {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--white);
  color: var(--black);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  z-index: 2;
}

.product-info {
  text-align: center;
}

.product-name {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 6px;
  opacity: 0.9;
}

.product-price {
  font-size: 0.9rem;
  font-weight: 700;
  opacity: 0.7;
}

.back-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 50%;
  cursor: pointer;
  display: grid;
  place-items: center;
  z-index: 101;
  transition: var(--transition);
}

.back-btn:hover {
  background: rgba(255,255,255,0.1);
  transform: scale(1.1) rotate(-90deg);
}

/*========================
📦 صفحة المنتج - زي الصورة التالتة
========================*/
#productPage {
  padding-bottom: 100px;
}

.product-detail {
  padding: 20px 5%;
  max-width: 600px;
  margin: 0 auto;
}

.product-gallery {
  position: relative;
  width: 100%;
  aspect-ratio: 3/4;
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 0 60px var(--glow);
  animation: floatDetail 4s ease-in-out infinite;
}

@keyframes floatDetail {
  0%, 100% { transform: translateY(0px) rotateY(0deg); }
  50% { transform: translateY(-20px) rotateY(5deg); }
}

.product-gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.gallery-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  font-family: 'Orbitron', sans-serif;
}

.gallery-nav button {
  background: transparent;
  font-size: 1.2rem;
  cursor: pointer;
  opacity: 0.6;
  transition: var(--transition);
}

.gallery-nav button:hover { opacity: 1; }

.product-title {
  font-family: 'Orbitron', 'Cairo', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.price-wrap {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 32px;
  font-family: 'Orbitron', sans-serif;
}

.price-old {
  text-decoration: line-through;
  opacity: 0.4;
  font-size: 1.1rem;
}

.price-new {
  font-size: 1.4rem;
  font-weight: 900;
}

.size-selector {
  margin-bottom: 32px;
}

.size-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.size-options {
  display: flex;
  gap: 12px;
}

.size-btn {
  width: 60px;
  height: 60px;
  background: transparent;
  border: 2px solid var(--glass-border);
  border-radius: 16px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}

.size-btn.active {
  background: var(--white);
  color: var(--black);
  border-color: var(--white);
  box-shadow: 0 0 30px var(--glow);
}

.size-btn:hover:not(.active) {
  border-color: rgba(255,255,255,0.3);
  transform: scale(1.05);
}

.add-to-cart-btn {
  width: 100%;
  padding: 18px;
  background: var(--white);
  color: var(--black);
  border-radius: 16px;
  font-weight: 900;
  font-size: 1.1rem;
  cursor: pointer;
  transition: var(--transition);
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  margin-bottom: 40px;
}

.add-to-cart-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 50px var(--glow);
}

.info-section {
  padding: 20px 0;
  border-top: 1px solid var(--glass-border);
  font-size: 0.95rem;
  line-height: 1.8;
}

.info-section strong {
  font-family: 'Orbitron', sans-serif;
  display: block;
  margin-bottom: 8px;
  font-size: 1.05rem;
}

/*========================
🛒 السلة
========================*/
.cart-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  max-width: 450px;
  height: 100vh;
  background: rgba(0, 0, 0, 0.96);
  backdrop-filter: var(--blur);
  border-left: 1px solid var(--glass-border);
  z-index: 300;
  padding: 32px;
  transform: translateX(-100%);
  transition: var(--transition);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.cart-panel.active { transform: translateX(0); }

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}

.cart-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 24px;
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
}

.cart-item img {
  width: 70px;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
}

.cart-total {
  border-top: 1px solid var(--glass-border);
  padding-top: 24px;
  margin-bottom: 24px;
}

.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 1.3rem;
  font-weight: 800;
}

.checkout-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.input-group input {
  width: 100%;
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  transition: var(--transition);
}

.input-group input:focus {
  border-color: rgba(255, 255, 255, 0.3);
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
}

.payment-note {
  padding: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  font-size: 0.85rem;
  line-height: 1.6;
}

/*========================
📱 Toast Notification
========================*/
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--white);
  color: var(--black);
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  z-index: 9999;
  transition: var(--transition);
  box-shadow: 0 10px 40px var(--glow);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/*========================
📱 Responsive
========================*/
@media (min-width: 768px) {
 .products-list {
    max-width: 1200px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }
}

@media (min-width: 1024px) {
 .products-list {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

    img: "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=600&h=800&fit=crop",
    images: ["https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=600&h=800&fit=crop"],

];

const WHATSAPP_NUMBER = '201234567890';
let cart = [];
let currentProduct = null;
let currentImageIndex = 0;
let selectedSize = 'M';

//========================
// التنقل بين الصفحات
//========================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0, 0);

  if (pageId === 'catalogPage') renderCatalog();
}

function showContact() {
  showToast('تواصل معنا: واتساب ' + WHATSAPP_NUMBER);
}

//========================
// عرض الكتالوج
//========================
function renderCatalog() {
  const list = document.getElementById('productsList');
  list.innerHTML = PRODUCTS.map(p => `
    <div class="product-item" data-id="${p.id}">
      <div class="product-img-wrap">
        ${p.soldOut? '<div class="sold-out-badge">Sold out</div>' : ''}
        <img class="product-img" src="${p.img}" alt="${p.name}" draggable="false">
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">LE ${p.price}.00 EGP</div>
      </div>
    </div>
  `).join('');

  // Click to open product
  document.querySelectorAll('.product-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (!e.target.closest('.product-img-wrap')) return;
      const id = parseInt(item.dataset.id);
      openProduct(id);
    });

    // Swipe effect
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    const imgWrap = item.querySelector('.product-img-wrap');
    const img = item.querySelector('.product-img');

    imgWrap.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      isDragging = true;
      item.classList.add('swiping');
    });

    imgWrap.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX;
      const diff = currentX - startX;
      img.style.transform = `translateX(${diff}px) rotateY(${diff * 0.5}deg)`;
    });

    imgWrap.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      item.classList.remove('swiping');

      const diff = currentX - startX;
      if (Math.abs(diff) > 100) {
        // Flip animation
        img.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
        img.style.transform = `translateX(${diff > 0? '100%' : '-100%'}) rotateY(${diff > 0? '180deg' : '-180deg'})`;

        setTimeout(() => {
          img.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
          img.style.transform = 'translateX(0) rotateY(0deg)';
          setTimeout(() => img.style.transition = '', 600);
        }, 300);
      } else {
        img.style.transform = 'translateX(0) rotateY(0deg)';
      }
    });
  });
}

//========================
// صفحة المنتج
//========================
function openProduct(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  currentImageIndex = 0;
  selectedSize = currentProduct.sizes[0];

  renderProductDetail();
  showPage('productPage');
}

function renderProductDetail() {
  const p = currentProduct;
  document.getElementById('productDetail').innerHTML = `
    <div class="product-gallery">
      <img src="${p.images[currentImageIndex]}" alt="${p.name}">
    </div>
    <div class="gallery-nav">
      <button onclick="changeImage(-1)">‹</button>
      <span>${currentImageIndex + 1}/${p.images.length}</span>
      <button onclick="changeImage(1)">›</button>
    </div>
    <h1 class="product-title">${p.name}</h1>
    <div class="price-wrap">
      ${p.oldPrice? `<div class="price-old">${p.oldPrice}.00 EGP</div>` : ''}
      <div class="price-new">LE ${p.price}.00 EGP</div>
    </div>
    <div class="size-selector">
      <div class="size-label">SIZE</div>
      <div class="size-options">
        ${p.sizes.map(s => `
          <button class="size-btn ${s === selectedSize? 'active' : ''}" onclick="selectSize('${s}')">${s}</button>
        `).join('')}
      </div>
    </div>
    <button class="add-to-cart-btn" onclick="addToCart()" ${p.soldOut? 'disabled' : ''}>
      ${p.soldOut? 'SOLD OUT' : 'ADD TO CART'}
    </button>
    <div class="info-section">
      <strong>Fast Delivery and Returns</strong>
      <div>Safe Delivery</div>
      <div>Delivered in 3 - 5 working days</div>
    </div>
  `;
}

function changeImage(dir) {
  currentImageIndex += dir;
  if (currentImageIndex < 0) currentImageIndex = currentProduct.images.length - 1;
  if (currentImageIndex >= currentProduct.images.length) currentImageIndex = 0;
  renderProductDetail();
}

function selectSize(size) {
  selectedSize = size;
  renderProductDetail();
}

//========================
// السلة
//========================
function addToCart() {
  if (currentProduct.soldOut) return;

  const existing = cart.find(item => item.id === currentProduct.id && item.size === selectedSize);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({...currentProduct, size: selectedSize, qty: 1 });
  }

  updateCart();
  showToast('تمت الإضافة للسلة ✓');
}

function toggleCart() {
  document.getElementById('cartPanel').classList.toggle('active');
}
