<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOSE | Clothing Brand</title>
    <style>
        :root {
            --glow-color: rgba(255, 255, 255, 0.6);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: var(--text-color);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* خلفية الفيديو */
        #video-bg {Pin by Yare Mendez on insp _ Trippy visuals_ Dark nature aesthetic_ Film texture(MP4).mp4}
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.8); /* تقليل السطوع عشان الكلام يظهر */
            object-fit: cover;
        }

        /* الشاشة الرئيسية */
        .page {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* اللوجو الدوار */
        .logo-container {Picsart_26-04-17_15-18-45-258.png}
            margin-top: 50px;
            perspective: 1000px;
        }

        .logo {
            width: 150px;
            animation: rotate360 8s linear infinite;
        }

        @keyframes rotate360 {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* الأزرار المضيئة */
        .nav-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 15px 40px;
            margin: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--glow-color);
            text-shadow: 0 0 5px white;
        }

        .nav-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 25px white;
        }

        /* قائمة المنتجات (موبايل) */
        .product-list {
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
        }

        .product-card {
            margin-bottom: 50px;
            text-align: center;
            position: relative;
        }

        .product-img-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto;
            /* تأثير العوم */
            animation: float 3s ease-in-out infinite;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* تأثير قلب الصورة عند اللمس */
        .product-img-wrapper:active .product-img {
            transform: rotateY(180deg);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* صفحة المنتج التفصيلية */
        .product-detail-view {
            text-align: center;
            width: 100%;
        }

        .price { font-size: 1.5rem; margin: 10px 0; }
        .old-price { text-decoration: line-through; color: #888; font-size: 1.1rem; margin-right: 10px; }

        .size-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .size-btn {
            border: 1px solid white;
            background: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        /* أيقونات السوشيال ميديا */
        .social-icons {
            margin-top: auto;
            padding-bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .social-icons img { width: 30px; filter: invert(1); }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="your-video-link.mp4" type="video/mp4">
    </video>

    <div id="home" class="page active">
        <div class="logo-container">
            <img src="your-logo.png" class="logo" alt="Logo">
        </div>
        <div style="margin-top: 100px; display: flex; flex-direction: column;">
            <button class="nav-btn" onclick="showPage('catalog')">Catalog</button>
            <button class="nav-btn">Contact</button>
        </div>
        <div class="social-icons">
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Insta"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok"></a>
        </div>
    </div>

    <div id="catalog" class="page">
        <h2 style="letter-spacing: 5px;">COLLECTION</h2>
        <div class="product-list">
            <div class="product-card" onclick="showProductDetail('RAY LOOSE PANT', '500', '900')">
                <div class="product-img-wrapper">
                    <img src="product-front.png" class="product-img" alt="Product">
                </div>
                <h3>RAY LOOSE PANT</h3>
                <p>LE 500.00 EGP</p>
            </div>
            </div>
        <button class="nav-btn" onclick="showPage('home')">Back</button>
    </div>

    <div id="product-detail" class="page">
        <div class="product-detail-view">
            <div class="product-img-wrapper" style="width: 300px; height: 300px;">
                <img src="product-front.png" class="product-img" id="detail-img" style="animation: rotate360 10s linear infinite;">
            </div>
            <h1 id="detail-title">PRODUCT NAME</h1>
            <div class="price">
                <span class="old-price" id="detail-old-price">900 EGP</span>
                <span id="detail-price">500 EGP</span>
            </div>
            <div class="size-selector">
                <button class="size-btn">S</button>
                <button class="size-btn">M</button>
                <button class="size-btn">L</button>
            </div>
            <p style="color: #ccc;">Fast Delivery and Returns</p>
            <button class="nav-btn" style="width: 80%;">Add to Cart</button>
        </div>
        <button class="nav-btn" onclick="showPage('catalog')" style="margin-top: 20px;">Back to Catalog</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function showProductDetail(name, price, oldPrice) {
            document.getElementById('detail-title').innerText = name;
            document.getElementById('detail-price').innerText = 'LE ' + price + '.00 EGP';
            document.getElementById('detail-old-price').innerText = 'LE ' + oldPrice + '.00 EGP';
            showPage('product-detail');
        }
    </script>
</body>
</html>
