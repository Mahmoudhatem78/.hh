<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حوكشه STORE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
/*========================
🎯 الإعدادات الأساسية
========================*/
:root {
  --black: #000000;
  --white: #ffffff;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --glow: rgba(255, 255, 255, 0.25);
  --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  --blur: blur(24px);
  
  /*========================
  🔧 عدل الروابط دي براحتك - الأماكن محددة بالعربي
  ========================*/
  
  /* 1. حط رابط فيديو الخلفية هنا ↓↓ */
  --bg-video: url('https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4');
  
  /* 2. حط رابط صورة اللوجو بتاعك هنا ↓↓↓ */
  --logo-img: url('https://via.placeholder.com/300x300/000/fff?text=حوكشه+LOGO');
  
  /* 3. حط رقم الواتساب بتاعك هنا - من غير + ↓↓↓ */
  --whatsapp: '201234567890';
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

button, input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
  color: inherit;
}

/*========================
🎬 فيديو الخلفية + طبقة التعتيم
========================*/
.bg-video-wrap {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.bg-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* عدل إضاءة الخلفية من هنا: 0.2 غامق جداً, 0.8 فاتح */
  filter: brightness(0.8) contrast(1.1);
}

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: radial-gradient(circle at 30% 50%, transparent 0%, rgba(0,0,0,0.8) 70%);
  pointer-events: none;
}

/* Noise effect زيادة واقعية */
.bg-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

/*========================
🧠 الهيدر - فيه اللوجو بتاعك
========================*/
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 28px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
}

.header.scrolled {
  padding: 14px 5%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
}

.logo {
  width: 70px;
  height: 70px;
  background: var(--logo-img) center/contain no-repeat;
  transition: var(--transition);
  filter: drop-shadow(0 0 20px var(--glow));
  cursor: pointer;
}

.header.scrolled .logo {
  width: 45px;
  height: 45px;
}

.cart-btn {
  position: relative;
  width: 52px;
  height: 52px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  display: grid;
  place-items: center;
}

.cart-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 30px var(--glow);
  transform: scale(1.08);
}

.cart-count {
  position: absolute;
  top: -5px;
  left: -5px;
  background: var(--white);
  color: var(--black);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 0.75rem;
  font-weight: 700;
  display: grid;
  place-items: center;
  transform: scale(0);
  transition: var(--transition);
}

.cart-count.active { transform: scale(1); }

/*========================
🎬 قسم الهيرو - أول ما تفتح الموقع
========================*/
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 5% 80px;
  position: relative;
}

.logo-hero {
  width: 180px;
  height: 180px;
  background: var(--logo-img) center/contain no-repeat;
  filter: drop-shadow(0 0 50px var(--glow));
  animation: rotate360 12s linear infinite, floatHero 4s ease-in-out infinite;
  margin-bottom: 40px;
  transform-style: preserve-3d;
}

@keyframes rotate360 {
  from { transform: rotateY(0deg) rotateX(5deg); }
  to { transform: rotateY(360deg) rotateX(5deg); }
}

@keyframes floatHero {
  0%, 100% { transform: translateY(0px) rotateY(0deg); }
  50% { transform: translateY(-20px) rotateY(180deg); }
}

.hero h1 {
  font-size: 3.5rem;
  font-weight: 900;
  margin-bottom: 16px;
  letter-spacing: -1px;
  opacity: 0;
  animation: fadeInUp 1s 0.3s forwards;
}

.hero .tagline {
  font-size: 1.3rem;
  font-weight: 400;
  opacity: 0;
  margin-bottom: 12px;
  animation: fadeInUp 1s 0.5s forwards;
}

.hero .sub-tagline {
  font-size: 1rem;
  font-weight: 300;
  opacity: 0;
  margin-bottom: 40px;
  color: rgba(255,255,255,0.7);
  animation: fadeInUp 1s 0.7s forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.btn {
  background: var(--white);
  color: var(--black);
  padding: 16px 40px;
  border-radius: 100px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: var(--transition);
  opacity: 0;
  animation: fadeInUp 1s 0.9s forwards;
}

.btn:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 10px 50px var(--glow);
}

.btn:active { transform: scale(0.98); }

/* Scroll Indicator */
.scroll-indicator {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 26px;
  height: 40px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  opacity: 0;
  animation: fadeInUp 1s 1.2s forwards;
}

.scroll-indicator::before {
  content: '';
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 8px;
  background: var(--white);
  border-radius: 2px;
  animation: scrollDown 2s infinite;
}

@keyframes scrollDown {
  0% { top: 8px; opacity: 1; }
  100% { top: 24px; opacity: 0; }
}

/*========================
📚 قسم المنتجات
========================*/
.products-section {
  padding: 100px 5% 120px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-title {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 60px;
  text-align: center;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 36px;
}

.product-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 28px;
  padding: 28px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.product-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
  opacity: 0;
  transition: var(--transition);
  pointer-events: none;
}

.product-card:hover::before { opacity: 0.15; }

.product-card:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 80px rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.25);
}

.product-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 24px;
  transition: var(--transition);
}

.product-card:hover .product-img {
  transform: scale(1.04);
  box-shadow: 0 0 50px var(--glow);
}

.product-name {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.product-price {
  font-size: 1.1rem;
  font-weight: 600;
  opacity: 0.9;
}

/*========================
📖 مودال تفاصيل المنتج
========================*/
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: var(--blur);
  display: grid;
  place-items: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition);
}

.modal.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  width: 100%;
  max-width: 950px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  border-radius: 36px;
  padding: 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  transform: scale(0.9) translateY(20px);
  transition: var(--transition);
  position: relative;
}

.modal.active .modal-content {
  transform: scale(1) translateY(0);
}

.modal-close {
  position: absolute;
  top: 24px;
  left: 24px;
  width: 44px;
  height: 44px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: var(--transition);
  z-index: 10;
}

.modal-close:hover {
  background: rgba(255, 255, 255, 0.12);
  transform: rotate(90deg) scale(1.1);
}

.product-img-glow {
  width: 100%;
  border-radius: 24px;
  filter: drop-shadow(0 0 60px var(--glow));
  animation: floatProduct 5s ease-in-out infinite;
}

@keyframes floatProduct {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-18px); }
}

.product-info h2 {
  font-size: 2.2rem;
  margin-bottom: 14px;
}

.product-info .price {
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 28px;
}

.product-info .desc {
  opacity: 0.85;
  margin-bottom: 36px;
  line-height: 1.9;
  font-size: 1.05rem;
}

.qty-selector {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 36px;
}

.qty-btn {
  width: 44px;
  height: 44px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  cursor: pointer;
  transition: var(--transition);
  font-size: 1.2rem;
}

.qty-btn:hover {
  background: rgba(255, 255, 255, 0.12);
  transform: scale(1.1);
}

.qty-value {
  font-size: 1.3rem;
  font-weight: 700;
  min-width: 35px;
  text-align: center;
}

/*========================
🛒 سلة المشتريات
========================*/
.cart-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  max-width: 450px;
  height: 100vh;
  background: rgba(0, 0, 0, 0.92);
  backdrop-filter: var(--blur);
  border-left: 1px solid var(--glass-border);
  z-index: 300;
  padding: 36px;
  transform: translateX(-100%);
  transition: var(--transition);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.cart-panel.active { transform: translateX(0); }

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 36px;
}

.cart-header h3 { font-size: 1.5rem; }

.cart-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 24px;
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  transition: var(--transition);
}

.cart-item:hover { background: rgba(255,255,255,0.08); }

.cart-item img {
  width: 70px;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
}

.cart-total {
  border-top: 1px solid var(--glass-border);
  padding-top: 28px;
  margin-bottom: 28px;
}

.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 1.4rem;
  font-weight: 800;
}

/*========================
💳 فورم الطلب - يبعت واتساب
========================*/
.checkout-form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.input-group input {
  width: 100%;
  padding: 16px 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  transition: var(--transition);
  font-size: 0.95rem;
}

.input-group input:focus {
  border-color: rgba(255, 255, 255, 0.35);
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.06);
}

.input-group input::placeholder { color: rgba(255, 255, 255, 0.4); }

.payment-note {
  padding: 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  font-size: 0.9rem;
  line-height: 1.7;
}

/*========================
📱 ريسبونسيف
========================*/
@media (max-width: 768px) {
  .modal-content {
    grid-template-columns: 1fr;
    padding: 28px;
    gap: 28px;
  }
  
  .hero h1 { font-size: 2.5rem; }
  .hero .tagline { font-size: 1.1rem; }
  .logo-hero { width: 140px; height: 140px; }
  
  .products-grid {
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 24px;
  }
  
  .cart-panel { max-width: 100%; }
  .section-title { font-size: 2rem; }
}

/* Cursor Glow Effect */
body::before {
  content: '';
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 9999;
  transform: translate(-50%, -50%);
}
</style>
</head>

let cart = [];

let currentQty = 1;

//========================
// DOM
//========================
const header = document.getElementById('header');
const productsGrid = document.getElementById('productsGrid');
const productModal = document.getElementById('productModal');
const cartPanel = document.getElementById('cartPanel');
const cartCount = document.getElementById('cartCount');

//========================
// INIT
//========================
document.addEventListener('DOMContentLoaded', () => {
  renderProducts();
  setupEvents();
  setupScroll();
  setupCursorGlow();
});

//========================
// عرض المنتجات
//========================
function renderProducts() {
  productsGrid.innerHTML = PRODUCTS.map(p => `
    <div class="product-card" data-id="${p.id}">
      <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="product-name">${p.name}</div>
      <div class="product-price">${p.price} EGP</div>
    </div>
  `).join('');
  
  document.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', () => openProduct(parseInt(card.dataset.id)));
    
    // Parallax 3D effect
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      card.style.transform = `translateY(-12px) scale(1.02) rotateX(${y * -6}deg) rotateY(${x * 6}deg)`;
    });
    
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
}

//========================
// الأحداث
//========================
function setupEvents() {
  document.getElementById('exploreBtn').addEventListener('click', () => {
    document.getElementById('productsSection').scrollIntoView({ behavior: 'smooth' });
  });
  
  document.getElementById('headerLogo').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  
  document.getElementById('cartBtn').addEventListener('click', toggleCart);
  document.getElementById('cartClose').addEventListener('click', toggleCart);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('qtyPlus').addEventListener('click', () => updateQty(1));
  document.getElementById('qtyMinus').addEventListener('click', () => updateQty(-1));
  document.getElementById('addToCartBtn').addEventListener('click', addToCart);
  document.getElementById('checkoutForm').addEventListener('submit', handleOrder);
  
  productModal.addEventListener('click', (e) => {
    if (e.target === productModal) closeModal();
  });
  
  // Logo parallax in hero
  const logoHero = document.getElementById('logoHero');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 15;
    const y = (e.clientY / window.innerHeight - 0.5) * 15;
    logoHero.style.filter = `drop-shadow(0 0 50px var(--glow)) drop-shadow(${x}px ${y}px 30px rgba(255,255,255,0.1))`;
  });
}

//========================
// Scroll Effects
//========================
function setupScroll() {
  window.addEventListener('scroll', () => {
    if (window.pageYOffset > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });
}

//========================
// Cursor Glow
//========================
function setupCursorGlow() {
  document.addEventListener('mousemove', (e) => {
    document.body.style.setProperty('--x', e.clientX + 'px');
    document.body.style.setProperty('--y', e.clientY + 'px');
    const before = document.querySelector('body::before');
    document.body.style.setProperty('--cursor-x', e.clientX + 'px');
    document.body.style.setProperty('--cursor-y', e.clientY + 'px');
  });
}

//========================
// مودال المنتج
//========================
function openProduct(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  currentQty = 1;
  
  document.getElementById('modalImg').src = currentProduct.img;
  document.getElementById('modalName').textContent = currentProduct.name;
  document.getElementById('modalPrice').textContent = `${currentProduct.price} EGP`;
  document.getElementById('modalDesc').textContent = currentProduct.desc;
  document.getElementById('qtyValue').textContent = currentQty;
  
  productModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  productModal.classList.remove('active');
  document.body.style.overflow = '';
}

function updateQty(change) {
  currentQty = Math.max(1, currentQty + change);
  document.getElementById('qtyValue').textContent = currentQty;
}

//========================
// نظام السلة
//========================
function addToCart() {
  const existing = cart.find(item => item.id === currentProduct.id);
  
  if (existing) {
    existing.qty += currentQty;
  } else {
    cart.push({ ...currentProduct, qty: currentQty });
  }
  
  updateCart();
  closeModal();
  
  cartCount.style.transform = 'scale(1.4)';
  setTimeout(() => cartCount.style.transform = 'scale(1)', 300);
}

function toggleCart() {
  cartPanel.classList.toggle('active');
  document.body.style.overflow = cartPanel.classList.contains('active') ? 'hidden' : '';
}

function updateCart() {
  const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
  const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  
  cartCount.textContent = totalItems;
  cartCount.classList.toggle('active', totalItems > 0);
  document.getElementById('cartTotal').textContent = `${totalPrice} EGP`;
  
  document.getElementById('cartItems').innerHTML = cart.length ? cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}">
      <div style="flex: 1;">
        <div style="font-weight: 700; margin-bottom: 6px;">${item.name}</div>
        <div style="opacity: 0.8; font-size: 0.9rem;">${item.qty} × ${item.price} EGP</div>
        <div style="font-weight: 700; margin-top: 4px;">${item.price * item.qty} EGP</div>
      </div>
      <button onclick="removeFromCart(${item.id})" style="background: none; cursor: pointer; opacity: 0.6; font-size: 1.5rem; padding: 0 8px;">×</button>
    </div>
  `).join('') : '<div style="text-align: center; opacity: 0.5; padding: 60px 0;">السلة فارغة حالياً</div>';
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  updateCart();
}
